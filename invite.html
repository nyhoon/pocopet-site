<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PocoPet 초대</title>
  <meta http-equiv="refresh" content="0;url=https://play.google.com/store/apps/details?id=com.pocopet" />
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var ref = (params.get('ref') || '').trim().toUpperCase();
      var play = 'https://play.google.com/store/apps/details?id=com.pocopet';
      if (ref.length >= 4) {
        play += '&referrer=' + encodeURIComponent('ref=' + ref);
      }
      window.location.replace(play);
    })();
  </script>
</head>
<body>
  <p>PocoPet Play 스토어로 이동 중…</p>
  <p><a id="fallback" href="https://play.google.com/store/apps/details?id=com.pocopet">여기를 눌러 설치</a></p>
</body>
</html>
